name: Build and Push Docker Server Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (leave empty for version from pyproject.toml)'
        required: false
        type: string
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - 'Dockerfile.server'
      - 'lib/**'
      - 'pyproject.toml'
      - 'schema.prisma'
      - 'docker-entrypoint.sh'

env:
  IMAGE_NAME: ansible-inspec
  DOCKERFILE: Dockerfile.server

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=Ansible-InSpec Server
            org.opencontainers.image.description=Compliance testing server with Ansible and InSpec integration
            org.opencontainers.image.vendor=ansible-inspec
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Test server image
        run: |
          echo "Testing server image..."
          docker pull ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          
          # Test that required binaries exist
          docker run --rm --entrypoint /bin/sh ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} -c "which ansible-inspec"
          docker run --rm --entrypoint /bin/sh ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} -c "which prisma"
          docker run --rm --entrypoint /bin/sh ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} -c "which uvicorn"
          docker run --rm --entrypoint /bin/sh ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} -c "which inspec"
          
          echo "✅ All required binaries found"

      - name: Create release summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🐳 Docker Server Image Built Successfully
          
          **Image:** \`${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\`
          
          **Tags:**
          $(echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /')
          
          **Pull command:**
          \`\`\`bash
          docker pull ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          \`\`\`
          
          **Run server:**
          \`\`\`bash
          docker run -p 8080:8080 \\
            -e DATABASE_URL="postgresql://user:pass@host:5432/db" \\
            -e JWT_SECRET_KEY="your-secret" \\
            ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          \`\`\`
          
          **Kubernetes deployment:**
          \`\`\`bash
          helm upgrade ansible-inspec ./helm/ansible-inspec \\
            --set image.tag=${{ steps.version.outputs.version }} \\
            -n ansible-inspec
          \`\`\`
          EOF

  security-scan:
    runs-on: ubuntu-latest
    needs: build-server
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy for summary
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: "table"
          severity: 'CRITICAL,HIGH'
