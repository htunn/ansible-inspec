name: Publish to PyPI

on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - "v*"

permissions:
  id-token: write # IMPORTANT: this permission is mandatory for trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ansible-inspec

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for PyPI propagation
        run: |
          echo "Waiting for package to be available on PyPI..."
          sleep 120  # Wait 2 minutes for PyPI propagation

      - name: Install from PyPI
        run: |
          echo "Installing ansible-inspec from PyPI..."
          pip install ansible-inspec

      - name: Test basic functionality
        run: |
          echo "Testing --version command..."
          ansible-inspec --version

          echo "Testing --license command..."
          ansible-inspec --license

          echo "Testing --help command..."
          ansible-inspec --help

      - name: Test init profile command
        run: |
          echo "Testing init profile command..."
          ansible-inspec init profile test-profile
          test -f test-profile/inspec.yml || (echo "❌ Profile creation failed" && exit 1)
          echo "✅ Profile creation successful"

      - name: Test exec command (dry run)
        run: |
          echo "Testing exec command help..."
          ansible-inspec exec --help
          echo "✅ All commands validated"
