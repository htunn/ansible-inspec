[tool:pytest]
# Pytest configuration for ansible-inspec

# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Options
addopts =
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers - all markers must be registered
    --strict-markers
    # Strict config - ensure config file is valid
    --strict-config
    # Disable cacheprovider for cleaner runs
    -p no:cacheprovider

# Markers - custom test categories
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require database/services)
    slow: Slow running tests
    requires_inspec: Tests that require InSpec to be installed
    requires_docker: Tests that require Docker to be running
    api: API endpoint tests
    models: Model and data structure tests
    vcs: VCS integration tests
    auth: Authentication and authorization tests
    
# Asyncio configuration
asyncio_mode = auto

# Coverage options (when using pytest-cov)
[coverage:run]
source = ansible_inspec.server
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
