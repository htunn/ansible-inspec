apiVersion: v2
name: ansible-inspec
description: Enterprise compliance testing with Ansible and InSpec integration
type: application
version: 0.2.9
appVersion: "0.2.7"

keywords:
  - compliance
  - security
  - ansible
  - inspec
  - devops
  - audit

maintainers:
  - name: ansible-inspec contributors
    email: htunnthuthu.linux@gmail.com

sources:
  - https://github.com/Htunn/ansible-inspec

dependencies:
  - name: postgresql
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

home: https://github.com/Htunn/ansible-inspec

annotations:
  artifacthub.io/category: security
  artifacthub.io/license: GPL-3.0-or-later
  artifacthub.io/readme: |
    file://README.md
  artifacthub.io/changes: |
    - kind: fixed
      description: Fix init container image repository to use GitHub Container Registry
      links:
        - name: GitHub Release
          url: https://github.com/Htunn/ansible-inspec/releases/tag/v0.2.9
    - kind: fixed
      description: Database migrations now work with Prisma CLI included in GHCR image
    - kind: changed
      description: Init container uses same image repository as main container
    - kind: security
      description: Consistent image source prevents deployment failures
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/images: |
    - name: ansible-inspec
      image: ghcr.io/htunn/ansible-inspec:0.2.8
      platforms:
        - linux/amd64
        - linux/arm64
    - name: postgresql
      image: docker.io/bitnami/postgresql:15
      whitelisted: true
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/Htunn/ansible-inspec/tree/main/helm/ansible-inspec
    - name: Documentation
      url: https://github.com/Htunn/ansible-inspec-docs
    - name: GitHub Container Registry
      url: https://github.com/Htunn/ansible-inspec/pkgs/container/ansible-inspec
    - name: PyPI Package
      url: https://pypi.org/project/ansible-inspec/
    - name: support
      url: https://github.com/Htunn/ansible-inspec/issues
  artifacthub.io/maintainers: |
    - name: Htunn Thu Thu
      email: htunnthuthu.linux@gmail.com
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/bitnami/postgresql
    - url: https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack

