{{- if .Values.streamlit.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ansible-inspec.fullname" . }}-ui
  labels:
    {{- include "ansible-inspec.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.streamlit.service.type }}
  ports:
    - port: {{ .Values.streamlit.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ansible-inspec.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
{{- end }}
