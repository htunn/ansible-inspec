{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ansible-inspec.fullname" . }}
  labels:
    {{- include "ansible-inspec.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database connection
  {{- if .Values.externalDatabase.enabled }}
  DATABASE_URL: {{ include "ansible-inspec.databaseUrl" . | quote }}
  DATABASE__URL: {{ include "ansible-inspec.databaseUrl" . | quote }}
  POSTGRES_PASSWORD: {{ .Values.externalDatabase.password | quote }}
  {{- else }}
  DATABASE_URL: {{ include "ansible-inspec.databaseUrl" . | quote }}
  DATABASE__URL: {{ include "ansible-inspec.databaseUrl" . | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
  
  # JWT secret
  AUTH__JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  
  # Encryption key for VCS credentials
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  
  {{- if .Values.secrets.azureClientSecret }}
  # Azure AD client secret
  AUTH__AZURE_CLIENT_SECRET: {{ .Values.secrets.azureClientSecret | quote }}
  {{- end }}
  
  {{- if .Values.secrets.webhookSecret }}
  # Webhook secret
  VCS__WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | quote }}
  {{- end }}
{{- end }}
