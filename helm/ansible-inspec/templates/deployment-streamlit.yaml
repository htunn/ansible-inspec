{{- if .Values.streamlit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ansible-inspec.fullname" . }}-ui
  labels:
    {{- include "ansible-inspec.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.streamlit.replicaCount }}
  selector:
    matchLabels:
      {{- include "ansible-inspec.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.streamlit.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ansible-inspec.labels" . | nindent 8 }}
        app.kubernetes.io/component: ui
        {{- with .Values.streamlit.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ansible-inspec.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: streamlit-ui
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "streamlit", "run"]
          args:
            - "/usr/local/lib/python3.13/site-packages/ansible_inspec/server/streamlit_app.py"
            - "--server.port={{ .Values.streamlit.port }}"
            - "--server.address=0.0.0.0"
            - "--browser.gatherUsageStats=false"
            - "--server.headless=true"
          ports:
            - name: http
              containerPort: {{ .Values.streamlit.port }}
              protocol: TCP
          env:
            - name: API_BASE_URL
              value: "http://{{ include "ansible-inspec.fullname" . }}:{{ .Values.service.port }}/api/v1"
            - name: API_SERVER_URL
              value: {{ if .Values.streamlit.externalUrl }}"{{ .Values.streamlit.externalUrl }}"{{ else if .Values.ingress.enabled }}"https://{{ (index .Values.ingress.hosts 0).host }}"{{ else }}"http://{{ include "ansible-inspec.fullname" . }}:{{ .Values.service.port }}"{{ end }}
            - name: STREAMLIT_SERVER_PORT
              value: "{{ .Values.streamlit.port }}"
            {{- with .Values.streamlit.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.streamlit.resources | nindent 12 }}
      {{- with .Values.streamlit.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamlit.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamlit.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
