services:
  # PostgreSQL Database with Prisma ORM
  postgres:
    image: postgres:16-alpine
    container_name: ansible-inspec-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ansibleinspec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ansibleinspec}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ansibleinspec}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ansible-inspec-network
    restart: unless-stopped

  # ansible-inspec API Server with Prisma ORM
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ansible-inspec-api
    env_file:
      - .env
    environment:
      # Override for Docker network - use service name as hostname
      DATABASE__URL: postgresql://${POSTGRES_USER:-ansibleinspec}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ansibleinspec}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ansibleinspec}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ansibleinspec}
      # Prisma query engine binary location
      HOME: /home/ansibleinspec
      PRISMA_QUERY_ENGINE_BINARY: /home/ansibleinspec/.cache/prisma-python/binaries/5.17.0/393aa359c9ad4a4bb28630fb5613f9c281cde053/node_modules/prisma/query-engine-linux-arm64-openssl-3.0.x
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      # Mount profiles directory for local InSpec profiles
      - ./profiles:/app/profiles:ro
      # Mount VCS repositories directory for synced Git repositories
      - vcs_repos:/tmp/ansible-inspec-repos
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ansible-inspec-network
    restart: unless-stopped
    # Run database initialization before starting API server
    command: >
      sh -c '
      echo "Initializing database schema..." &&
      prisma db push --accept-data-loss --skip-generate &&
      echo "Starting API server..." &&
      uvicorn ansible_inspec.server:app --host 0.0.0.0 --port 8080
      '

  # ansible-inspec Streamlit UI
  ui:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ansible-inspec-ui
    env_file:
      - .env
    environment:
      # Point to API service (internal Docker network)
      API_BASE_URL: http://api:8080/api/v1
      # External API URL for OAuth redirects (accessible from browser)
      API_SERVER_URL: http://localhost:8080
    ports:
      - "${UI_PORT:-8081}:8081"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ansible-inspec-network
    restart: unless-stopped
    # Override entrypoint to skip DB migrations for UI-only service
    entrypoint: []
    command:
      [
        "python3",
        "-m",
        "streamlit",
        "run",
        "/usr/local/lib/python3.13/site-packages/ansible_inspec/server/streamlit_app.py",
        "--server.port",
        "8081",
        "--server.address",
        "0.0.0.0",
        "--server.headless",
        "true",
        "--browser.gatherUsageStats",
        "false",
      ]

volumes:
  postgres_data:
    driver: local
    name: ansible-inspec-postgres-data
  vcs_repos:
    driver: local
    name: ansible-inspec-vcs-repos

networks:
  ansible-inspec-network:
    driver: bridge
    name: ansible-inspec-network
